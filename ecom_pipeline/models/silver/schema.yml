version: 2

models:
  - name: silver_orders
    description: "Cleaned and deduplicated order-level data. Grain: one row per order_id."
    columns:
      - name: order_id
        description: "Unique order identifier."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Customer identifier linked to the order."
        tests:
          - not_null

      - name: order_status
        description: "Standardized order status."
        tests:
          - not_null
          - accepted_values:
              values:
                - created
                - approved
                - invoiced
                - processing
                - shipped
                - delivered
                - unavailable
                - canceled

      - name: order_purchase_timestamp
        description: "Timestamp when the order was placed."

      - name: ingestion_timestamp
        description: "Timestamp when the record was ingested into Bronze."
        tests:
          - not_null






  - name: silver_customers
    description: "Cleaned and deduplicated customer data. Grain: one row per customer_id."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: customer_unique_id
        tests:
          - not_null

      - name: customer_state
        tests:
          - not_null

      - name: ingestion_timestamp
        tests:
          - not_null





  - name: silver_products
    description: "Cleaned and deduplicated product data. Grain: one row per product_id."
    columns:
      - name: product_id
        description: "Unique product identifier."
        tests:
          - not_null
          - unique

      - name: product_category_name
        description: "Standardized product category name."
        tests:
          - not_null

      - name: product_name_length
        description: "Length of the product name."

      - name: product_description_length
        description: "Length of the product description."

      - name: product_weight_g
        tests:
          - non_negative

      - name: product_length_cm
        tests:
          - non_negative

      - name: product_height_cm
        tests:
          - non_negative

      - name: product_width_cm
        tests:
          - non_negative

      - name: ingestion_timestamp
        tests:
          - not_null


    


  - name: silver_sellers
    description: "Cleaned and deduplicated seller data. Grain: one row per seller_id."
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

      - name: seller_city
        tests:
          - not_null

      - name: seller_state
        tests:
          - not_null

      - name: ingestion_timestamp
        tests:
          - not_null



  - name: silver_payments
    description: "Cleaned payment data. Grain: one row per order_id and payment_sequential."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_orders')
              field: order_id

      - name: payment_sequential
        tests:
          - not_null

      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values:
                - credit_card
                - boleto
                - voucher
                - debit_card
                - not_defined

      - name: payment_installments
        tests:
          - non_negative

      - name: payment_value
        tests:
          - not_null
          - non_negative

      - name: ingestion_timestamp
        tests:
          - not_null



    

  - name: silver_order_items
    description: "Cleaned order item data. Grain: one row per order_id and order_item_id."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_orders')
              field: order_id

      - name: order_item_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_products')
              field: product_id

      - name: seller_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_sellers')
              field: seller_id

      - name: price
        tests:
          - not_null
          - non_negative

      - name: freight_value
        tests:
          - not_null
          - non_negative

      - name: ingestion_timestamp
        tests:
          - not_null