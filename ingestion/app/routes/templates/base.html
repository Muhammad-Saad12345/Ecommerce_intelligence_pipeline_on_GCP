<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f8ff;
        color: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 35%),
          linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }

      .site-shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 20px 40px;
      }

      header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 0;
      }

      .brand {
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .nav-links a {
        color: #1d4ed8;
        text-decoration: none;
        border-radius: 999px;
        padding: 10px 16px;
        transition: background 0.2s ease;
        font-weight: 600;
      }

      .nav-links a:hover {
        background: rgba(37, 99, 235, 0.12);
      }

      .page-body {
        display: grid;
        gap: 24px;
      }

      .page-title {
        margin: 0;
        font-size: 2.4rem;
        line-height: 1.08;
      }

      .page-intro {
        margin: 12px 0 0;
        max-width: 760px;
        line-height: 1.8;
        color: #475569;
      }

      .card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
        padding: 30px;
      }

      .hero-grid {
        display: grid;
        gap: 16px;
      }

      .hero-grid--actions {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .primary-button,
      .secondary-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border-radius: 14px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .primary-button {
        background: #2563eb;
        color: white;
      }

      .secondary-button {
        background: #e2e8f0;
        color: #0f172a;
      }

      .primary-button:hover,
      .secondary-button:hover {
        opacity: 0.94;
      }

      .page-footer {
        color: #64748b;
        font-size: 0.95rem;
        line-height: 1.7;
      }

      .status-success {
        color: #16a34a;
        font-weight: 700;
      }

      .status-warning {
        color: #d97706;
        font-weight: 700;
      }

      .status-failed {
        color: #dc2626;
        font-weight: 700;
      }

      @media (min-width: 768px) {
        .page-shell {
          padding: 32px 32px 48px;
        }
      }
    </style>
  </head>
  <body>
    <div class="site-shell">
      <header>
        <div class="brand">E-Commerce Intelligence Portal</div>
        <nav class="nav-links">
          <a href="/">Home</a>
          <a href="/upload">Upload</a>
          <a href="/dashboard">Dashboard</a>
          <a href="/ai-chat">AI Chatbot</a>
        </nav>
      </header>

      <section class="page-body">
        {% block content %}{% endblock %}
      </section>

      <footer class="page-footer">
        Built for the Olist pipeline: upload raw CSV data, validate in Cloud Run, and push cleaned data into Bronze BigQuery.
      </footer>
    </div>
  </body>
</html>
